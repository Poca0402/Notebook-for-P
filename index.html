<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博笔记本 · Cyber Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#FAF6F1;--bg-secondary:#F0EAE0;--bg-card:#FFFFFF;--bg-hover:#F7F2EB;--accent:#D97757;--accent-light:#E8956F;--accent-subtle:rgba(217,119,87,0.08);--accent-border:rgba(217,119,87,0.2);--text-primary:#2D2017;--text-secondary:#7A6E62;--text-tertiary:#A89E94;--border:#E5DDD3;--border-light:#EDE7DF;--shadow-sm:0 1px 3px rgba(45,32,23,0.04);--shadow-md:0 4px 16px rgba(45,32,23,0.06);--shadow-lg:0 8px 32px rgba(45,32,23,0.08);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--transition:0.2s cubic-bezier(0.4,0,0.2,1)}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Noto Serif SC','Georgia',serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.7;overflow-x:hidden}

/* ══════ COVER ══════ */
.cover-scene{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:#1A120B;transition:opacity 0.6s ease 0.8s,visibility 0s 1.4s}
.cover-scene.opened{opacity:0;visibility:hidden;pointer-events:none}
.cover-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:rgba(217,119,87,0.3);border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

.cover-wrapper{perspective:1800px;width:420px;height:560px;position:relative}
@media(max-width:500px){.cover-wrapper{width:300px;height:420px}}
.notebook-3d{width:100%;height:100%;position:relative;transform-style:preserve-3d}

.nb-back{position:absolute;inset:0;background:linear-gradient(170deg,#F5EDE3,#EDE4D8);border-radius:4px 16px 16px 4px;box-shadow:inset 2px 0 8px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center}
.nb-back-lines{width:80%;height:70%;background:repeating-linear-gradient(transparent,transparent 31px,rgba(180,160,140,0.18) 31px,rgba(180,160,140,0.18) 32px);border-left:2px solid rgba(217,119,87,0.25);padding-left:20px;padding-top:8px}
.nb-back-lines p{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--text-tertiary);line-height:32px}

.nb-front{position:absolute;inset:0;transform-origin:left center;transition:transform 1s cubic-bezier(0.4,0,0.15,1);transform-style:preserve-3d;cursor:pointer;z-index:2}
.cover-scene.opened .nb-front{transform:rotateY(-160deg)}
.nb-front-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:4px 16px 16px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;background:radial-gradient(ellipse at 30% 20%,rgba(80,55,35,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,0,0,0.05) 0%,transparent 50%),linear-gradient(170deg,#3A2618 0%,#2D1E12 40%,#241810 100%);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04),inset -2px 0 6px rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.03);overflow:hidden}
.nb-front-inner{position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);border-radius:16px 4px 4px 16px;background:linear-gradient(170deg,#F5EDE3,#EDE4D8);box-shadow:inset -2px 0 8px rgba(0,0,0,0.06)}
.nb-front::after{content:'';position:absolute;left:-2px;top:5%;bottom:5%;width:14px;background:linear-gradient(90deg,rgba(0,0,0,0.35),transparent);z-index:3;border-radius:2px 0 0 2px;pointer-events:none;transition:opacity 0.5s}
.cover-scene.opened .nb-front::after{opacity:0}

.cover-ornament-top,.cover-ornament-bottom{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center}
.cover-ornament-top{top:36px}.cover-ornament-bottom{bottom:36px}
.ornament-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(217,119,87,0.5),transparent)}
.ornament-diamond{width:6px;height:6px;border:1px solid rgba(217,119,87,0.5);transform:rotate(45deg)}

.cover-emblem{width:80px;height:80px;border:1.5px solid rgba(217,119,87,0.45);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative;animation:eg 4s ease-in-out infinite}
@keyframes eg{0%,100%{box-shadow:0 0 20px rgba(217,119,87,0.08)}50%{box-shadow:0 0 40px rgba(217,119,87,0.2)}}
.cover-emblem::before{content:'';position:absolute;inset:6px;border:1px solid rgba(217,119,87,0.2);border-radius:50%}
.cover-emblem-icon{font-size:1.8rem;filter:drop-shadow(0 0 8px rgba(217,119,87,0.3))}
.cover-title{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:#F0E6DA;letter-spacing:0.04em;text-align:center;margin-bottom:6px;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.cover-subtitle{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:rgba(217,180,155,0.55);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:32px}
.cover-divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin-bottom:28px}
.cover-date{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:rgba(217,180,155,0.4);letter-spacing:0.12em}
.cover-prompt{position:absolute;bottom:56px;font-size:0.75rem;color:rgba(217,180,155,0.35);animation:cb 3s ease-in-out infinite;letter-spacing:0.08em}
@keyframes cb{0%,100%{opacity:0.35}50%{opacity:0.7}}

.nb-pages{position:absolute;top:3%;bottom:3%;right:-3px;width:8px;display:flex;flex-direction:column;z-index:1}
.nb-page-edge{flex:1;background:linear-gradient(90deg,#E8DFD3,#F2EBE1);border-right:1px solid rgba(0,0,0,0.04)}
.nb-page-edge:nth-child(odd){background:linear-gradient(90deg,#E2D9CC,#EDE5DA)}

/* ══════ APP ══════ */
.app{display:flex;min-height:100vh;opacity:0;transition:opacity 0.5s ease 1.2s}
.app.visible{opacity:1}
.sidebar{width:240px;background:var(--bg-secondary);border-right:1px solid var(--border);padding:32px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.3s ease}
.main{flex:1;margin-left:240px;padding:40px 48px;max-width:100%;min-height:100vh}

.logo{padding:0 24px 28px;border-bottom:1px solid var(--border);margin-bottom:20px}
.logo h1{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;letter-spacing:-0.02em}
.logo p{font-size:0.72rem;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-top:4px;letter-spacing:0.08em;text-transform:uppercase}

.nav{flex:1;padding:0 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:0.9rem;color:var(--text-secondary);border:none;background:none;width:100%;text-align:left;font-family:inherit;position:relative}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--accent-subtle);color:var(--accent);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{font-size:1.15rem;width:24px;text-align:center}
.sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font-size:0.72rem;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace}

/* Sync status */
.sync-status{padding:8px 24px;font-size:0.7rem;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.online{background:#4CAF50}
.sync-dot.offline{background:var(--text-tertiary)}
.sync-dot.syncing{background:#FFA726;animation:blink 1s infinite}
.sync-dot.error{background:#EF5350}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.page-header{margin-bottom:32px;display:flex;align-items:flex-end;justify-content:space-between}
.page-header h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;letter-spacing:-0.02em}
.page-header .subtitle{font-size:0.82rem;color:var(--text-tertiary);margin-top:4px;font-family:'JetBrains Mono',monospace}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--radius-sm);font-size:0.85rem;font-family:inherit;cursor:pointer;transition:all var(--transition);border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary)}
.btn:hover{border-color:var(--accent-border);background:var(--bg-hover)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-light);border-color:var(--accent-light)}
.btn-sm{padding:5px 12px;font-size:0.78rem}

.card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition)}
.card:hover{box-shadow:var(--shadow-md)}

.diary-editor{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.editor-area{min-height:400px}
.editor-title{width:100%;border:none;background:transparent;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:var(--text-primary);padding:0 0 12px;border-bottom:1px solid var(--border-light);margin-bottom:16px;outline:none}
.editor-title::placeholder{color:var(--text-tertiary)}
.editor-content{width:100%;border:none;background:transparent;font-family:inherit;font-size:0.95rem;color:var(--text-primary);line-height:2;resize:none;min-height:320px;outline:none}
.editor-content::placeholder{color:var(--text-tertiary)}
.editor-toolbar{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--border-light);margin-top:16px;align-items:center;flex-wrap:wrap}
.mood-options{display:flex;gap:8px;flex-wrap:wrap}
.mood-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--border-light);background:var(--bg-card);font-size:1.2rem;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.mood-btn:hover{border-color:var(--accent);transform:scale(1.1)}
.mood-btn.selected{border-color:var(--accent);background:var(--accent-subtle)}

.side-panel{display:flex;flex-direction:column;gap:20px}
.mini-calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mini-calendar-header h4{font-size:0.88rem;font-weight:600}
.mini-calendar-nav{display:flex;gap:4px}
.mini-calendar-nav button{width:28px;height:28px;border-radius:50%;border:1px solid var(--border-light);background:var(--bg-card);cursor:pointer;font-size:0.75rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition);color:var(--text-secondary)}
.mini-calendar-nav button:hover{background:var(--bg-hover)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-grid .day-label{font-size:0.68rem;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;padding:4px 0}
.cal-day{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.78rem;cursor:pointer;transition:all var(--transition);border:none;background:none;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;position:relative}
.cal-day:hover{background:var(--bg-hover)}
.cal-day.today{color:var(--accent);font-weight:700}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.has-entry::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-day.selected.has-entry::after{background:#fff}
.cal-day.empty{cursor:default}

.recent-entries h4{font-size:0.82rem;color:var(--text-secondary);margin-bottom:10px;font-weight:600}
.entry-item{padding:10px 0;border-bottom:1px solid var(--border-light);cursor:pointer;transition:all var(--transition)}
.entry-item:last-child{border-bottom:none}
.entry-item:hover .entry-title{color:var(--accent)}
.entry-date{font-size:0.7rem;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace}
.entry-title{font-size:0.85rem;font-weight:600;margin-top:2px;transition:color var(--transition)}
.entry-preview{font-size:0.78rem;color:var(--text-secondary);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.calendar-full{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}
.full-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.full-cal-grid .day-label{font-size:0.75rem;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;padding:8px;text-align:center}
.full-cal-day{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.88rem;cursor:pointer;transition:all var(--transition);border:2px solid transparent;background:var(--bg-card);color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.full-cal-day:hover{border-color:var(--border)}
.full-cal-day.today{border-color:var(--accent);color:var(--accent);font-weight:700}
.full-cal-day.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.full-cal-day.has-entry{background:var(--accent-subtle)}
.full-cal-day.has-entry .cal-mood{font-size:0.7rem;margin-top:2px}
.full-cal-day.selected.has-entry{background:var(--accent)}
.full-cal-day.empty{background:transparent;cursor:default;border-color:transparent}
.day-detail{position:sticky;top:40px}
.day-detail-empty{text-align:center;padding:48px 24px;color:var(--text-tertiary)}
.day-detail-empty .empty-icon{font-size:2.5rem;margin-bottom:12px}
.day-detail-content h3{font-family:'Playfair Display',serif;font-size:1.25rem;margin-bottom:4px}
.day-detail-date{font-size:0.75rem;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-bottom:16px}
.day-detail-body{font-size:0.9rem;line-height:2;color:var(--text-secondary);white-space:pre-wrap}

.answers-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center}
.book-visual{width:320px;height:400px;perspective:1000px;margin-bottom:36px;cursor:pointer}
.book-inner{width:100%;height:100%;position:relative;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}
.book-inner.flipped{transform:rotateY(180deg)}
.book-front,.book-back-ans{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px}
.book-front{background:linear-gradient(145deg,#2D2017,#4A3728);color:#FAF6F1;border:2px solid rgba(217,119,87,0.3);box-shadow:var(--shadow-lg)}
.book-front h3{font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:8px}
.book-front p{font-size:0.82rem;color:rgba(250,246,241,0.5)}
.book-decoration{width:60px;height:60px;border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:20px;animation:pg 3s ease-in-out infinite}
@keyframes pg{0%,100%{box-shadow:0 0 20px rgba(217,119,87,0.2)}50%{box-shadow:0 0 40px rgba(217,119,87,0.4)}}
.book-back-ans{background:var(--bg-card);transform:rotateY(180deg);border:2px solid var(--accent-border);box-shadow:var(--shadow-lg)}
.answer-text{font-family:'Playfair Display',serif;font-size:1.4rem;line-height:1.6;color:var(--text-primary);max-width:260px}
.answer-divider{width:40px;height:2px;background:var(--accent);margin:16px 0}
.answers-hint{font-size:0.82rem;color:var(--text-tertiary);margin-top:8px}

.pomodoro-page{display:flex;flex-direction:column;align-items:center;padding-top:40px}
.pomodoro-modes{display:flex;gap:4px;background:var(--bg-secondary);border-radius:var(--radius-md);padding:4px;margin-bottom:48px}
.pomo-mode-btn{padding:8px 20px;border-radius:var(--radius-sm);border:none;background:none;font-family:inherit;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;transition:all var(--transition)}
.pomo-mode-btn.active{background:var(--bg-card);color:var(--text-primary);box-shadow:var(--shadow-sm);font-weight:600}
.timer-circle{width:280px;height:280px;position:relative;margin-bottom:40px}
.timer-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:var(--border-light);stroke-width:4}
.timer-progress{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-time{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:500;letter-spacing:-0.02em}
.timer-label{font-size:0.78rem;color:var(--text-tertiary);margin-top:4px;text-transform:uppercase;letter-spacing:0.1em}
.timer-controls{display:flex;gap:12px;margin-bottom:36px}
.timer-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.timer-btn:hover{border-color:var(--accent)}
.timer-btn.primary{width:64px;height:64px;background:var(--accent);border-color:var(--accent);color:#fff;font-size:1.3rem}
.timer-btn.primary:hover{background:var(--accent-light)}
.pomo-stats{display:flex;gap:40px;text-align:center}
.pomo-stat-value{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:500}
.pomo-stat-label{font-size:0.72rem;color:var(--text-tertiary);margin-top:2px;text-transform:uppercase;letter-spacing:0.08em}

/* Settings page */
.settings-page{max-width:560px}
.settings-group{margin-bottom:28px}
.settings-group h3{font-size:0.9rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.settings-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'JetBrains Mono',monospace;font-size:0.82rem;background:var(--bg-card);color:var(--text-primary);outline:none;transition:border-color var(--transition)}
.settings-input:focus{border-color:var(--accent)}
.settings-hint{font-size:0.75rem;color:var(--text-tertiary);margin-top:6px;line-height:1.6}
.settings-row{display:flex;gap:8px;align-items:center;margin-top:10px}

.toast{position:fixed;bottom:28px;right:28px;background:var(--text-primary);color:var(--bg-primary);padding:12px 20px;border-radius:var(--radius-sm);font-size:0.85rem;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:all 0.3s ease;z-index:999}
.toast.show{transform:translateY(0);opacity:1}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeIn 0.3s ease}

.mobile-header{display:none;position:fixed;top:0;left:0;right:0;background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:12px 16px;z-index:101;align-items:center;justify-content:space-between}
.hamburger{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.hamburger span{display:block;width:20px;height:2px;background:var(--text-primary);border-radius:1px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99}

@media(max-width:860px){
  .mobile-header{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0;padding:72px 16px 24px}
  .diary-editor{grid-template-columns:1fr}
  .calendar-full{grid-template-columns:1fr}
  .page-header h2{font-size:1.4rem}
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="cover-scene" id="coverScene">
  <div class="cover-particles" id="particles"></div>
  <div class="cover-wrapper">
    <div class="notebook-3d">
      <div class="nb-back"><div class="nb-back-lines"><p>今天也要好好记录生活...</p></div></div>
      <div class="nb-pages"><div class="nb-page-edge"></div><div class="nb-page-edge"></div><div class="nb-page-edge"></div><div class="nb-page-edge"></div><div class="nb-page-edge"></div><div class="nb-page-edge"></div><div class="nb-page-edge"></div><div class="nb-page-edge"></div></div>
      <div class="nb-front" id="nbFront" onclick="openNotebook()">
        <div class="nb-front-face">
          <div class="cover-ornament-top"><span class="ornament-line"></span><span class="ornament-diamond"></span><span class="ornament-line"></span></div>

<script>
// ═══════════════════════════════════════
//  COVER
// ═══════════════════════════════════════

// ═══════════════════════════════════════
//  GITHUB SYNC ENGINE
// ═══════════════════════════════════════
const GH_CFG_KEY = 'cyber_nb_gh_config';
const GH_DATA_FILE = 'notebook-data.json';
let ghConfig = JSON.parse(localStorage.getItem(GH_CFG_KEY) || 'null'); // {token, owner, repo}
let ghSHA = null; // SHA of the data file, needed for updates
let syncState = 'offline'; // offline | syncing | online | error

function setSyncState(state, msg) {
  syncState = state;
  const el = document.getElementById('syncStatus');
  const labels = { offline: '未连接云端', syncing: '同步中...', online: '已连接云端', error: msg || '同步失败' };
  el.innerHTML = `<span class="sync-dot ${state}"></span> ${labels[state]}`;
}

// Base64 helpers that handle Unicode (Chinese characters)
function utf8ToB64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64ToUtf8(b64) {
  return decodeURIComponent(escape(atob(b64)));
}

async function ghAPI(path, method='GET', body=null) {
  if (!ghConfig) return null;
  const opts = {
    method,
    headers: {
      'Authorization': `token ${ghConfig.token}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${path}`, opts);
  if (!r.ok) throw new Error(`GitHub API ${r.status}`);
  return r.json();
}

async function cloudLoad() {
  if (!ghConfig) return null;
  setSyncState('syncing');
  try {
    const res = await ghAPI(GH_DATA_FILE);
    ghSHA = res.sha;
    const data = JSON.parse(b64ToUtf8(res.content.replace(/\n/g, '')));
    setSyncState('online');
    return data;
  } catch (e) {
    if (e.message.includes('404')) {
      // File doesn't exist yet, that's fine
      setSyncState('online');
      return null;
    }
    console.error('Cloud load failed:', e);
    setSyncState('error', '读取失败');
    return null;
  }
}

async function cloudSave(data) {
  if (!ghConfig) return;
  setSyncState('syncing');
  try {
    const body = {
      message: `Update notebook ${new Date().toISOString().slice(0, 10)}`,
      content: utf8ToB64(JSON.stringify(data, null, 2))
    };
    if (ghSHA) body.sha = ghSHA;
    const res = await ghAPI(GH_DATA_FILE, 'PUT', body);
    ghSHA = res.content.sha;
    setSyncState('online');
  } catch (e) {
    console.error('Cloud save failed:', e);
    setSyncState('error', '保存失败，已存本地');
    // If SHA mismatch (409 conflict), try to re-fetch
    if (e.message.includes('409') || e.message.includes('422')) {
      try {
        const res = await ghAPI(GH_DATA_FILE);
        ghSHA = res.sha;
        // Retry save
        const body = { message: `Update notebook ${new Date().toISOString().slice(0, 10)}`, content: utf8ToB64(JSON.stringify(data, null, 2)), sha: ghSHA };
        const r2 = await ghAPI(GH_DATA_FILE, 'PUT', body);
        ghSHA = r2.content.sha;
        setSyncState('online');
      } catch (e2) {
        console.error('Retry failed:', e2);
      }
    }
  }
}

async function testGHConnection(token, owner, repo) {
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    return r.ok;
  } catch(e) { return false; }
}

// ═══════════════════════════════════════
//  DATA LAYER (localStorage + GitHub sync)
// ═══════════════════════════════════════
const DB='cyber_notebook_data';
function loadLocal(){try{const r=localStorage.getItem(DB);if(r)return JSON.parse(r);}catch(e){}return{entries:{},pomodoroCount:0};}
function saveLocal(d){localStorage.setItem(DB,JSON.stringify(d));}

let appData=loadLocal();

function getEntry(d){return appData.entries[d]||null;}

function saveEntry(d,t,c,m){
  appData.entries[d]={title:t,content:c,mood:m,updatedAt:Date.now()};
  saveLocal(appData);
  updateTotal();
  cloudSave(appData); // async, fire-and-forget
}

function deleteEntry(d){
  delete appData.entries[d];
  saveLocal(appData);
  updateTotal();
  cloudSave(appData);
}

function updateTotal(){document.getElementById('totalEntries').textContent=Object.keys(appData.entries).length;}

// Merge cloud data with local data (cloud wins for same-date conflicts if newer)
function mergeData(local, cloud) {
  if (!cloud) return local;
  const merged = { entries: { ...local.entries }, pomodoroCount: Math.max(local.pomodoroCount || 0, cloud.pomodoroCount || 0) };
  for (const [date, entry] of Object.entries(cloud.entries || {})) {
    if (!merged.entries[date] || (entry.updatedAt || 0) > (merged.entries[date].updatedAt || 0)) {
      merged.entries[date] = entry;
    }
  }
  return merged;
}

// Initial cloud sync on page load
async function initSync() {
  if (!ghConfig) return;
  const cloudData = await cloudLoad();
  if (cloudData) {
    appData = mergeData(appData, cloudData);
    saveLocal(appData);
    updateTotal();
    render();
    // Push merged data back to cloud
    await cloudSave(appData);
  }
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmt(s){const[y,m,d]=s.split('-');const w=['日','一','二','三','四','五','六'];return`${y}年${+m}月${+d}日 星期${w[new Date(+y,+m-1,+d).getDay()]}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ═══════════════════════════════════════
//  PAGES
// ═══════════════════════════════════════
let page='diary',calView=new Date(),calSel=ds(new Date()),dDate=ds(new Date()),dMood='';

function switchPage(p){

  document.getElementById('sidebarOverlay').classList.remove('show');
}

function render(){
  const c=document.getElementById('mainContent');
  if(page==='diary'){c.innerHTML=rDiary();initDiary();}
  else if(page==='calendar')c.innerHTML=rCal();
  else if(page==='answers')c.innerHTML=rAns();
  else if(page==='pomodoro')c.innerHTML=rPomo();
  else if(page==='settings')c.innerHTML=rSettings();
}

// ── DIARY ──
function rDiary(){
  const e=getEntry(dDate)||{},moods=['😊','😌','🤔','😢','😡','🎉','💪','🌙'],rec=getRec(5);
  return`<div class="page-content"><div class="page-header"><div><h2>写日记</h2><div class="subtitle">${fmt(dDate)}</div></div><div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="expMD()">⬇ 导出 MD</button><button class="btn btn-sm" onclick="expAll()">⬇ 导出全部</button></div></div><div class="diary-editor"><div class="card editor-area"><input class="editor-title" id="dT" placeholder="今天的标题..." value="${esc(e.title||'')}"><textarea class="editor-content" id="dC" placeholder="写下你的想法...">${esc(e.content||'')}</textarea><div class="editor-toolbar"><div class="mood-options">${moods.map(m=>`<button class="mood-btn ${dMood===m||e.mood===m?'selected':''}" onclick="selMood('${m}')">${m}</button>`).join('')}</div><div style="flex:1"></div><button class="btn btn-primary" onclick="saveDiary()">保存</button>${e.title?`<button class="btn btn-sm" style="color:#c44" onclick="delDiary()">删除</button>`:''}</div></div><div class="side-panel"><div class="card mini-calendar">${rMiniCal()}</div><div class="card recent-entries"><h4>最近日记</h4>${rec.length===0?'<p style="font-size:0.82rem;color:var(--text-tertiary);padding:12px 0">还没有日记，开始写吧 ✦</p>':rec.map(r=>`<div class="entry-item" onclick="loadD('${r.date}')"><div class="entry-date">${fmt(r.date)} ${r.mood||''}</div><div class="entry-title">${esc(r.title)}</div><div class="entry-preview">${esc(r.content.substring(0,50))}</div></div>`).join('')}</div></div></div></div>`;
}
function initDiary(){const e=getEntry(dDate);if(e&&e.mood)dMood=e.mood;}
function selMood(m){dMood=m;document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('selected',b.textContent===m));}
function saveDiary(){const t=document.getElementById('dT').value.trim(),c=document.getElementById('dC').value.trim();if(!t&&!c){toast('请先写点什么~');return;}saveEntry(dDate,t||'无题',c,dMood);toast('日记已保存 ✦');render();}
function delDiary(){if(confirm('确定要删除这篇日记吗？')){deleteEntry(dDate);dMood='';toast('已删除');render();}}
function loadD(d){dDate=d;dMood='';render();}
function getRec(n){return Object.entries(appData.entries).map(([d,e])=>({date:d,...e})).sort((a,b)=>b.updatedAt-a.updatedAt).slice(0,n);}

function expMD(){const e=getEntry(dDate);if(!e){toast('当前日期没有日记');return;}dl(`diary-${dDate}.md`,`# ${e.title}\n\n**日期**: ${fmt(dDate)}  \n**心情**: ${e.mood||'未记录'}\n\n---\n\n${e.content}\n`);toast('已导出 Markdown');}
function expAll(){const ent=Object.entries(appData.entries).sort(([a],[b])=>b.localeCompare(a));if(!ent.length){toast('还没有日记可导出');return;}let md=`# 赛博笔记本 · 日记合集\n\n导出时间: ${new Date().toLocaleString('zh-CN')}\n\n---\n\n`;ent.forEach(([d,e])=>{md+=`## ${e.title}\n\n**日期**: ${fmt(d)} | **心情**: ${e.mood||'未记录'}\n\n${e.content}\n\n---\n\n`;});dl(`cyber-notebook-all-${ds(new Date())}.md`,md);toast('已导出全部日记');}
function dl(name,content){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:'text/markdown;charset=utf-8'}));a.download=name;a.click();URL.revokeObjectURL(a.href);}

let mcM=new Date().getMonth(),mcY=new Date().getFullYear();
function rMiniCal(){
  const today=ds(new Date()),f=new Date(mcY,mcM,1).getDay(),days=new Date(mcY,mcM+1,0).getDate(),lb=['日','一','二','三','四','五','六'];
  let h=`<div class="mini-calendar-header"><h4>${mcY}年${mcM+1}月</h4><div class="mini-calendar-nav"><button onclick="mcP()">‹</button><button onclick="mcN()">›</button></div></div><div class="cal-grid">${lb.map(l=>`<span class="day-label">${l}</span>`).join('')}${Array(f).fill('<span class="cal-day empty"></span>').join('')}`;
  for(let d=1;d<=days;d++){const s=`${mcY}-${String(mcM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;h+=`<button class="${['cal-day',s===today&&'today',s===dDate&&'selected',appData.entries[s]&&'has-entry'].filter(Boolean).join(' ')}" onclick="loadD('${s}')">${d}</button>`;}
  return h+'</div>';
}
function mcP(){mcM--;if(mcM<0){mcM=11;mcY--;}render();}
function mcN(){mcM++;if(mcM>11){mcM=0;mcY++;}render();}

// ── CALENDAR ──
function rCal(){
  const today=ds(new Date()),y=calView.getFullYear(),mo=calView.getMonth(),f=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate(),lb=['日','一','二','三','四','五','六'],se=getEntry(calSel);
  let cal=`<div class="full-cal-grid">${lb.map(l=>`<span class="day-label">${l}</span>`).join('')}${Array(f).fill('<span class="full-cal-day empty"></span>').join('')}`;
  for(let d=1;d<=days;d++){const s=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,e=appData.entries[s];cal+=`<button class="${['full-cal-day',s===today&&'today',s===calSel&&'selected',e&&'has-entry'].filter(Boolean).join(' ')}" onclick="selCal('${s}')">${d}${e?`<span class="cal-mood">${e.mood||''}</span>`:''}</button>`;}
  cal+='</div>';
  const det=se?`<div class="day-detail-content"><h3>${esc(se.title)} ${se.mood||''}</h3><div class="day-detail-date">${fmt(calSel)}</div><div class="day-detail-body">${esc(se.content)}</div><div style="margin-top:20px;display:flex;gap:8px"><button class="btn btn-sm" onclick="loadD('${calSel}');switchPage('diary')">编辑</button><button class="btn btn-sm" onclick="expS('${calSel}')">导出 MD</button></div></div>`:`<div class="day-detail-empty"><div class="empty-icon">◇</div><p>选择一个日期<br>查看日记内容</p></div>`;
  return`<div class="page-content"><div class="page-header"><div><h2>日历回顾</h2><div class="subtitle">${y}年${mo+1}月</div></div><div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="calP()">‹ 上月</button><button class="btn btn-sm" onclick="calT()">今天</button><button class="btn btn-sm" onclick="calN()">下月 ›</button></div></div><div class="calendar-full"><div class="card">${cal}</div><div class="card day-detail">${det}</div></div></div>`;
}
function selCal(s){calSel=s;render();}
function calP(){calView.setMonth(calView.getMonth()-1);render();}
function calN(){calView.setMonth(calView.getMonth()+1);render();}
function calT(){calView=new Date();calSel=ds(new Date());render();}
function expS(d){const e=getEntry(d);if(!e)return;dl(`diary-${d}.md`,`# ${e.title}\n\n**日期**: ${fmt(d)}  \n**心情**: ${e.mood||'未记录'}\n\n---\n\n${e.content}\n`);toast('已导出');}

// ── ANSWERS ──
const ans=['是的，大胆去做吧。','再等等，时机未到。','答案就在你心中。','不要犹豫了。','换个角度想想。','相信你的直觉。','也许不是现在。','一切都会好的。','放下执念。','这是一个好主意。','你需要更多信息。','去冒险吧。','顺其自然。','现在就行动。','沉淀一下再说。','问问你信任的人。','这条路是对的。','试试别的方向。','保持耐心。','答案是肯定的。','不，换一条路吧。','你已经知道答案了。','专注当下。','勇敢一点。','休息一下再想。','相信过程。','做你害怕的事。','等一个月再看。','跟随你的热情。','有时候放弃也是智慧。','你比想象中更强大。','明天会更清晰。'];
let bFlip=false;
function rAns(){
  return`<div class="page-content"><div class="page-header" style="justify-content:center;text-align:center"><div><h2>答案之书</h2><div class="subtitle">The Book of Answers</div></div></div><div class="answers-page"><div class="book-visual" onclick="flipB()"><div class="book-inner" id="bI"><div class="book-front"><div class="book-decoration">❋</div><h3>答案之书</h3><p>BOOK OF ANSWERS</p></div><div class="book-back-ans"><div class="answer-divider"></div><div class="answer-text" id="aT">...</div><div class="answer-divider"></div></div></div></div><p class="answers-hint">心中默念你的问题，然后点击书本</p><button class="btn" style="margin-top:16px" onclick="resetB()">再问一次</button></div></div>`;
}
function flipB(){if(bFlip)return;bFlip=true;document.getElementById('aT').textContent=ans[Math.floor(Math.random()*ans.length)];document.getElementById('bI').classList.add('flipped');}
function resetB(){bFlip=false;document.getElementById('bI').classList.remove('flipped');}

// ── POMODORO ──
const PM={focus:{label:'专注',seconds:25*60},short:{label:'短休息',seconds:5*60},long:{label:'长休息',seconds:15*60}};
let pMode='focus',pTime=PM.focus.seconds,pRun=false,pInt=null,pTotal=appData.pomodoroCount||0;
function rPomo(){
  const tot=PM[pMode].seconds,pct=pTime/tot,r=126,circ=2*Math.PI*r,off=circ*(1-pct);
  const mm=String(Math.floor(pTime/60)).padStart(2,'0'),ss=String(pTime%60).padStart(2,'0');
  return`<div class="page-content"><div class="page-header" style="justify-content:center;text-align:center"><div><h2>番茄钟</h2><div class="subtitle">Pomodoro Timer</div></div></div><div class="pomodoro-page"><div class="pomodoro-modes">${Object.entries(PM).map(([k,v])=>`<button class="pomo-mode-btn ${pMode===k?'active':''}" onclick="sPM('${k}')">${v.label}</button>`).join('')}</div><div class="timer-circle"><svg viewBox="0 0 264 264"><circle class="timer-track" cx="132" cy="132" r="${r}"/><circle class="timer-progress" cx="132" cy="132" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="timer-display"><div class="timer-time">${mm}:${ss}</div><div class="timer-label">${PM[pMode].label}</div></div></div><div class="timer-controls"><button class="timer-btn" onclick="rsPo()">↺</button><button class="timer-btn primary" onclick="tPo()">${pRun?'⏸':'▶'}</button><button class="timer-btn" onclick="skPo()">⏭</button></div><div class="pomo-stats"><div><div class="pomo-stat-value">${pTotal}</div><div class="pomo-stat-label">今日完成</div></div><div><div class="pomo-stat-value">${Math.round(pTotal*25/60*10)/10}h</div><div class="pomo-stat-label">专注时长</div></div></div></div></div>`;
}
function sPM(m){pMode=m;pTime=PM[m].seconds;pRun=false;clearInterval(pInt);render();}
function tPo(){if(pRun){pRun=false;clearInterval(pInt);}else{pRun=true;pInt=setInterval(()=>{pTime--;if(pTime<=0){clearInterval(pInt);pRun=false;if(pMode==='focus'){pTotal++;appData.pomodoroCount=pTotal;saveLocal(appData);cloudSave(appData);toast('专注完成！休息一下吧 🎉');}else toast('休息结束，继续加油！');pTime=0;}render();},1000);}render();}
function rsPo(){pRun=false;clearInterval(pInt);pTime=PM[pMode].seconds;render();}
function skPo(){pRun=false;clearInterval(pInt);sPM(pMode==='focus'?'short':'focus');}

// ── SETTINGS ──
function rSettings(){
  const connected = !!ghConfig;
  return`<div class="page-content"><div class="page-header"><div><h2>同步设置</h2><div class="subtitle">GitHub Cloud Sync</div></div></div>
    <div class="settings-page">
      <div class="card">

          <h3>☁️ 云端同步状态：${connected ? '<span style="color:#4CAF50">已连接</span>' : '<span style="color:var(--text-tertiary)">未连接</span>'}</h3>
          ${connected ? `<p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px">数据同步到 <strong>${ghConfig.owner}/${ghConfig.repo}</strong></p>
            <div class="settings-row"><button class="btn btn-sm" onclick="manualSync()">立即同步</button><button class="btn btn-sm" onclick="disconnectGH()">断开连接</button></div>` : ''}
        </div>
        ${!connected ? `
        <div class="settings-group">
          <h3>连接 GitHub 仓库</h3>
          <p class="settings-hint" style="margin-bottom:12px">连接后，日记数据会自动保存到你的 GitHub 仓库，在任何设备打开网页都能读取。</p>
          <label style="font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:4px">GitHub 用户名</label>
          <input class="settings-input" id="ghOwner" placeholder="例如：Poca0402" value="">
          <div style="height:12px"></div>
          <label style="font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:4px">仓库名</label>
          <input class="settings-input" id="ghRepo" placeholder="例如：Notebook-for-P" value="">
          <div style="height:12px"></div>
          <label style="font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:4px">Personal Access Token</label>
          <input class="settings-input" id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx" value="">
          <p class="settings-hint">在 GitHub → Settings → Developer Settings → Personal Access Tokens 生成，勾选 repo 权限。</p>
          <div class="settings-row" style="margin-top:16px"><button class="btn btn-primary" onclick="connectGH()">连接并同步</button></div>
        </div>` : ''}
        <div class="settings-group" style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border-light)">
          <h3>💡 使用说明</h3>
          <p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.8">
            · 即使不连接云端，日记也会保存在浏览器本地，不会丢失<br>
            · 连接后每次保存日记会自动同步到 GitHub 仓库<br>
            · 在新设备上打开网站，配置同样的仓库信息即可同步<br>
            · Token 只保存在你自己的浏览器里，不会上传到任何地方
          </p>
        </div>
      </div>
    </div></div>`;
}

async function connectGH(){
  const owner = document.getElementById('ghOwner').value.trim();
  const repo = document.getElementById('ghRepo').value.trim();
  const token = document.getElementById('ghToken').value.trim();
  if(!owner||!repo||!token){toast('请填写完整信息');return;}

  toast('正在验证连接...');
  const ok = await testGHConnection(token, owner, repo);
  if(!ok){toast('连接失败，请检查信息是否正确');return;}

  ghConfig = {token, owner, repo};
  localStorage.setItem(GH_CFG_KEY, JSON.stringify(ghConfig));
  toast('连接成功！开始同步...');
  await initSync();
  render();
}

function disconnectGH(){
  if(!confirm('断开后此设备将不再云端同步，确定吗？'))return;
  ghConfig = null;
  ghSHA = null;
  localStorage.removeItem(GH_CFG_KEY);
  setSyncState('offline');
  toast('已断开云端连接');
  render();
}

async function manualSync(){
  toast('同步中...');
  const cloudData = await cloudLoad();
  if(cloudData){
    appData = mergeData(appData, cloudData);
    saveLocal(appData);
    updateTotal();
    await cloudSave(appData);
    render();
    toast('同步完成 ✦');
  } else {
    await cloudSave(appData);
    toast('已上传到云端 ✦');
  }
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
updateTotal();
render();
initSync(); // try to sync with GitHub on load
</script>
